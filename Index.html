<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBarato | Marketplace Gamer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="container header-content">
            <h1 class="logo">Game<span>Barato</span></h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Buscar periféricos, consoles...">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div class="header-icons">
                <i class="fas fa-shopping-cart"></i>
                <i class="fas fa-user"></i>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="categories">
            <button class="cat-btn active" data-filter="todos">Todos</button>
            <button class="cat-btn" data-filter="pc">PC</button>
            <button class="cat-btn" data-filter="console">Console</button>
            <button class="cat-btn" data-filter="mobile">Mobile</button>
            <button class="cat-btn highlight" data-filter="destaques">Destaques</button>
        </section>

        <section class="product-grid" id="productGrid">
            </section>
    </main>

    <script src="script.js"></script>
</body>
                                                                 </html>
